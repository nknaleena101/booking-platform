version: '3.8'

services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    environment:
      - PORT=3000
      - DB_HOST=db
      - DB_PORT=5432
      - DB_USERNAME=postgres
      - DB_PASSWORD=secret_pass
      - DB_NAME=en2h_booking_db
      - JWT_SECRET=docker_secret_key
      - JWT_EXPIRES_IN=1d
    depends_on:
      - db

  db:
    image: postgres:15-alpine
    ports:
      - "5432:5432"
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=secret_pass
      - POSTGRES_DB=en2h_booking_db
    volumes:
      - pgdata:/var/lib/postgresql/data

volumes:
  pgdata: